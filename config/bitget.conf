# PoP — Bitget BTC/USDT
# Usage: ./build/pop/pop --config config/bitget.conf
# Any key here can be overridden on the CLI:
#   ./build/pop/pop --config config/bitget.conf --log_level debug
#
# NOTE: Bitget CRC-32 checksums are intentionally disabled (require_checksum=false).
# Bitget's WS snapshot arrives with checksum=0 and is typically hundreds of updates
# behind the live stream, making all subsequent CRC checks fail spuriously.
# Integrity is maintained by the crossed-book guard (C1) and periodic validate (C3).

# ── Feed ─────────────────────────────────────────────────────────────────────
venue=bitget
base=BTC
quote=USDT
depthLevel=400

# ── Brain connection ──────────────────────────────────────────────────────────
brain_ws_host=127.0.0.1
brain_ws_port=8443
brain_ws_path=/

# ── mTLS client cert (must match CA loaded by brain --ca-certfile) ────────────
brain_ws_certfile=/tmp/certs/pop_cert.pem
brain_ws_keyfile=/tmp/certs/pop_key.pem
brain_ws_insecure=true     # dev-only: skip server cert check (CA not in system trust store)

# ── Persistence ───────────────────────────────────────────────────────────────
persist_path=/tmp/bitget_btc.jsonl.gz
persist_book_every_updates=500
persist_book_top=20

# ── Data quality ──────────────────────────────────────────────────────────────
max_msg_rate=0
validate_every=0
require_checksum=false

# ── Logging ───────────────────────────────────────────────────────────────────
log_level=info
# log_path=/tmp/bitget_pop.log
# health_port: plain-HTTP health endpoint port (0 = disabled)
# health_port=8080
