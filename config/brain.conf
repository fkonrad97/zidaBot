# Brain — arbitrage detection server
# Usage: ./build/brain/brain --config config/brain.conf
# Any key here can be overridden on the CLI:
#   ./build/brain/brain --config config/brain.conf --log-level debug

# ── Server ──────────────────────────────────────────────────────────────────
bind=0.0.0.0
port=8443

# ── TLS (required) ──────────────────────────────────────────────────────────
# Generate with the mTLS setup commands in docs/HOWTO.md § 3.
certfile=/tmp/certs/brain_cert.pem
keyfile=/tmp/certs/brain_key.pem

# ── mTLS (recommended) ──────────────────────────────────────────────────────
# Require PoP clients to present a certificate signed by this CA.
# Comment out or remove to disable mTLS (PoP can then use --brain_ws_insecure).
ca-certfile=/tmp/certs/ca_cert.pem

# ── Venue fees ───────────────────────────────────────────────────────────────
# Taker fee per venue in basis points (0.01% = 1 bps).
# net_spread_bps = raw_spread_bps − sell_venue_fee − buy_venue_fee
# min-spread-bps is applied to net_spread_bps, so only fee-profitable crosses emit.
# Comma-separated venue:fee_bps pairs. Omit a venue to treat its fee as 0.
# Common fees (VIP0 / retail tier):
#   Binance spot taker: 10 bps   OKX spot taker: 8 bps
#   Bybit spot taker:   10 bps   KuCoin spot taker: 10 bps   Bitget spot taker: 10 bps
#venue-fees=binance:10,okx:8,bybit:10,kucoin:10,bitget:10

# ── Arbitrage detection ──────────────────────────────────────────────────────
# min-spread-bps: only emit crosses at or above this threshold (0 = all crosses, including unprofitable)
# When venue-fees are configured, set this to 0 or a small positive value — the fee
# deduction already filters unprofitable crosses.
min-spread-bps=0
# max-spread-bps: suppress crosses above this cap; logged as anomalies (0 = no cap)
max-spread-bps=0
# rate-limit-ms: min ms between signals for the same (sell, buy) pair
rate-limit-ms=1000
# max-age-ms: max individual book age and max age diff between the two books
max-age-ms=5000
# max-price-deviation-pct: skip venues deviating > N% from median best_bid (0 = off)
max-price-deviation-pct=0
# depth: order book depth per venue
depth=50

# ── Output ───────────────────────────────────────────────────────────────────
output=/tmp/arb.jsonl
# output-max-mb: rotate arb JSONL at this file size (0 = no rotation)
output-max-mb=100

# ── Monitoring ───────────────────────────────────────────────────────────────
# watchdog-no-cross-sec: warn if no cross for N seconds while >= 2 venues synced (0 = off)
watchdog-no-cross-sec=120
# log-level: debug | info | warn | error
log-level=info
# health-port: plain-HTTP health endpoint port (0 = disabled)
# health-port=8081
