# PoP — Binance BTC/USDT
# Usage: ./build/pop/pop --config config/binance.conf
# Any key here can be overridden on the CLI:
#   ./build/pop/pop --config config/binance.conf --log_level debug

# ── Feed ─────────────────────────────────────────────────────────────────────
venue=binance
base=BTC
quote=USDT
depthLevel=400

# ── Brain connection ──────────────────────────────────────────────────────────
brain_ws_host=127.0.0.1
brain_ws_port=8443
brain_ws_path=/

# ── mTLS client cert (must match CA loaded by brain --ca-certfile) ────────────
brain_ws_certfile=/tmp/certs/pop_cert.pem
brain_ws_keyfile=/tmp/certs/pop_key.pem
brain_ws_insecure=true     # dev-only: skip server cert check (CA not in system trust store)

# ── Persistence ───────────────────────────────────────────────────────────────
persist_path=/tmp/binance_btc.jsonl.gz
persist_book_every_updates=500
persist_book_top=20

# ── Data quality ──────────────────────────────────────────────────────────────
# max_msg_rate: warn if msgs/sec > 2x this value at heartbeat (0 = off)
max_msg_rate=0
# validate_every: call OrderBook::validate() every N updates (0 = off)
validate_every=0
# Binance does not send checksums — keep false
require_checksum=false

# ── Logging ───────────────────────────────────────────────────────────────────
# log_level: debug | info | warn | error
log_level=info
# log_path=/tmp/binance_pop.log   # uncomment to also write log to file
# health_port: plain-HTTP health endpoint port (0 = disabled)
# health_port=8080
