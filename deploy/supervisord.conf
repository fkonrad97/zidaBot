; supervisord.conf — ZidaBot process supervisor (alternative to systemd)
; Usage (macOS / Docker / non-systemd Linux):
;   pip install supervisor
;   supervisord -c deploy/supervisord.conf
;   supervisorctl -c deploy/supervisord.conf status

[supervisord]
nodaemon=false
logfile=/var/log/zidabot/supervisord.log
pidfile=/var/run/zidabot/supervisord.pid
childlogdir=/var/log/zidabot

[unix_http_server]
file=/var/run/zidabot/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/zidabot/supervisor.sock

; ---- Brain ----
[program:brain]
command=/usr/local/bin/brain --config /etc/zidabot/brain.conf
autostart=true
autorestart=true
startsecs=3
startretries=10
stopsignal=TERM
stopwaitsecs=10
stdout_logfile=/var/log/zidabot/brain.log
stderr_logfile=/var/log/zidabot/brain.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5

; ---- PoP processes (one per venue) ----
